networks:
  private_network:
    ipam:
      driver: default
      config:
        - subnet: ${SUBNET?}.0/24

services:
  unbound:
    image: mvance/unbound:1.22.0
    command:
      #? Patch unbound configuration to increase rate limits (we are querying it from single IP)
      #? and remove forward-records.conf inclusion (to have only DNS server in leaks).
      - "sh"
      - "-c"
      - |
        sed -i "s|include: /opt/unbound/etc/unbound/forward-records.conf||g" /unbound.sh &&  \
        sed -i "s|ratelimit: 1000|ratelimit: 1000000|g" /unbound.sh &&  \
        sed -i "s|unwanted-reply-threshold: 10000|unwanted-reply-threshold: 10000000|g" /unbound.sh &&  \
        /unbound.sh
    restart: unless-stopped
    hostname: unbound
    # ports:
    #   - 53:53/tcp
    #   - 53:53/udp
    networks:
      private_network:
        ipv4_address: ${DNS_INTERNAL_HOST?}

  pihole:
    image: pihole/pihole:latest
    restart: unless-stopped
    hostname: pihole
    dns:
      - 127.0.0.1
      - ${DNS_INTERNAL_HOST?}
    # ports:
    #   - 80:80/tcp
    environment:
      TZ: ${TZ?}
      FTLCONF_webserver_api_password: ${PH_PASSWORD?}
      FTLCONF_dns_upstreams: ${DNS_INTERNAL_HOST?}
    volumes:
      - ./pihole/etc-pihole/:/etc/pihole/
      - ./pihole/etc-dnsmasq.d/:/etc/dnsmasq.d/
    networks:
      private_network:
        ipv4_address: ${PIH_INTERNAL_HOST?}
    depends_on:
      - unbound

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    restart: unless-stopped
    dns:
      - ${PIH_INTERNAL_HOST?}
      - ${DNS_INTERNAL_HOST?}
    ports:
      - ${WG_PORT?}:${WG_PORT?}/udp
      - 51821:51821  # Comment this line after first launch if you want, to disable web interface access from WWW (you can still access it inside VPN).
    environment:
      WG_HOST: ${WG_HOST?}
      WG_PORT: ${WG_PORT?}
      WG_DEFAULT_DNS: ${PIH_INTERNAL_HOST?}${AWG}
      WG_ALLOWED_IPS: ${WG_ALLOWED_IPS?}
      PASSWORD_HASH: ${WG_PASSWORD_HASH?}
      UI_TRAFFIC_STATS: true
      UI_CHART_TYPE: 1
    volumes:
      - ./wireguard/:/etc/wireguard/
    cap_add:
      - NET_ADMIN  # Neccessary for Wireguard to create its VPN interface.
      - SYS_MODULE  # Neccessary for loading Wireguard kernel module if it's not already loaded.
    sysctls:
      - net.ipv4.ip_forward=1  # WG requires IP forwarding (else it will drop packets with other destinations)
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      private_network:
        ipv4_address: ${WG_INTERNAL_HOST?}
    depends_on:
      - unbound
      - pihole
